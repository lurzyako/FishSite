databases:
  - name: fishsite-db
    plan: free

services:
  - type: web
    name: fishsite
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fishsite-db
          property: connectionString
